  <title>My Home</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      padding: 20px;
    }

    /* 1. Holds the image at exactly 50% width and locks the 316x543 aspect ratio */
    .overlay-container {
      position: relative;
      margin: 0 auto;
      width: 50%; /* Sets your desired width on the screen */
      height: 0;
      padding-bottom: 85.917%; /* Forces container to match the exact shape of your image */
    }

    /* 2. Forces image to sit nicely inside our aspect-ratio box and keeps pixel art crisp */
    .base-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      /* Turns off pixel filtering/blurring for crisp pixel art */
      image-rendering: pixelated; 
      image-rendering: crisp-edges;
    }

    /* 3. Locks the SVG right over the image at all times */
    .overlay-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 4. Clickable paths have no stroke and are completely invisible until hovered */
    .overlay-svg path {
      fill: rgba(255, 255, 255, 0); 
      stroke: none; 
      transition: fill 0.2s ease;
    }

    /* 5. Highlight shapes with a soft white glow when hovered */
    .overlay-svg a:hover path {
      fill: rgba(255, 255, 255, 0.50); 
    }
  </style>
